name = "looptloop-api"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Canonical production route intention:
# https://api.looptloop.online/v0
# Configure this route in Cloudflare once the Worker is ready:
# routes = [
#   { pattern = "api.looptloop.online/*", custom_domain = true }
# ]

[[d1_databases]]
binding = "DB"
database_name = "looptloop_witness_v01"
database_id = "b9ad8908-0ec1-40bd-bf66-229d5fb9884d" 

[vars]
API_BASE_URL = "https://api.looptloop.online/v0"
WITNESSKEY_VERIFY_BASE_URL = "https://witnesskey.online/verify"
ABRACADOO_ACCEPT_WITNESS_BASE_URL = "https://app.abracadoo.app/accept-witness/"
ALLOWED_ORIGINS = "https://app.abracadoo.app,https://abracadoo.app,https://witnesskey.online,http://localhost:8787,http://localhost:5173"
PROVENANCE_VERIFY_BASE_URL = "https://witnesskey.online/provenance/verify/"

# Set as secret, not plain var:
# wrangler secret put RECEIPT_SIGNING_SECRET
# wrangler secret put PROVENANCE_LOOP_SECRET
